<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hardware Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1c1c1e;
      --sidebar-bg: #161618;
      --panel-bg:   #1c1c1e;
      --viewer-bg:  #111113;
      --surface:    #252528;
      --surface2:   #2c2c2f;
      --border:     #3a3a3c;
      --border-dim: #2a2a2d;
      --accent:     #0a84ff;
      --accent-dim: #0a84ff22;
      --text:       #f5f5f7;
      --text-dim:   #98989d;
      --text-muted: #636366;
      --success:    #30d158;
      --warning:    #ffd60a;
      --danger:     #ff453a;
      --sidebar-w:  220px;
      --chat-w:     360px;
      --params-w:   260px;
      --radius:     10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      font-size: 13px;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-dim);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-top { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 16px 12px 0; }
    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 14px;
      padding: 0 4px;
    }
    .logo span { color: var(--accent); }
    .new-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      margin-bottom: 20px;
    }
    .new-btn:hover { background: var(--surface); border-color: var(--accent); }

    .section-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .6px;
      color: var(--text-muted);
      padding: 0 4px; margin-bottom: 6px;
    }
    .sessions-list { flex: 1; overflow-y: auto; }
    .sessions-list::-webkit-scrollbar { width: 4px; }
    .sessions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .session-item {
      display: flex; align-items: center;
      padding: 7px 8px;
      border-radius: 7px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 12px;
      gap: 8px;
      transition: background .12s, color .12s;
      overflow: hidden;
    }
    .session-item:hover  { background: var(--surface); color: var(--text); }
    .session-item.active { background: var(--surface2); color: var(--text); }
    .session-item svg { flex-shrink: 0; opacity: .5; }
    .session-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border-dim);
      display: flex; flex-direction: column; gap: 2px;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 7px;
      color: var(--text-muted); font-size: 12px;
      text-decoration: none;
      transition: background .12s, color .12s;
    }
    .sidebar-link:hover { background: var(--surface); color: var(--text); }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Chat panel ── */
    .chat-panel {
      width: var(--chat-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-dim);
      background: var(--panel-bg);
    }
    .chat-header {
      height: 48px; flex-shrink: 0;
      display: flex; align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border-dim);
      gap: 8px;
    }
    .chat-title { flex: 1; font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 7px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); font-size: 12px; cursor: pointer;
      transition: background .12s, color .12s;
    }
    .header-btn:hover { background: var(--surface); color: var(--text); }

    .messages {
      flex: 1; overflow-y: auto;
      padding: 16px; display: flex; flex-direction: column; gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-wrap { display: flex; flex-direction: column; gap: 6px; }
    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.assistant { align-items: flex-start; }

    .msg-bubble {
      max-width: 90%;
      padding: 10px 13px;
      border-radius: 14px;
      font-size: 13px; line-height: 1.5;
    }
    .msg-wrap.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-wrap.assistant .msg-bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg-wrap.error .msg-bubble {
      background: #ff453a22;
      color: var(--danger);
      border: 1px solid #ff453a44;
      border-radius: 10px;
    }

    /* image grid in user messages */
    .msg-images {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 6px; max-width: 260px;
    }
    .msg-images img {
      width: 80px; height: 80px; object-fit: cover;
      border-radius: 8px; border: 1px solid var(--border);
    }

    /* AI object card */
    .object-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex; align-items: center; gap: 8px;
      max-width: 90%;
    }
    .object-card-icon { font-size: 15px; }
    .object-card-name { flex: 1; font-size: 13px; font-weight: 500; }
    .version-badge {
      font-size: 10px; font-weight: 600;
      background: var(--accent-dim); color: var(--accent);
      padding: 2px 6px; border-radius: 4px;
    }
    .card-actions {
      display: flex; align-items: center; gap: 4px;
      padding-top: 6px;
    }
    .card-action-btn {
      background: transparent; border: none;
      color: var(--text-muted); cursor: pointer;
      padding: 4px 6px; border-radius: 5px; font-size: 14px;
      transition: background .12s, color .12s;
    }
    .card-action-btn:hover { background: var(--surface2); color: var(--text); }
    .model-badge {
      font-size: 11px; color: var(--text-muted);
      padding: 3px 8px; border-radius: 5px;
      border: 1px solid var(--border-dim);
      margin-left: 4px;
    }

    /* Fix with AI button */
    .fix-btn {
      align-self: center;
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-dim); font-size: 12px; cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .fix-btn:hover { background: var(--surface); color: var(--text); border-color: var(--accent); }

    /* Input area */
    .input-area {
      flex-shrink: 0;
      padding: 12px;
      border-top: 1px solid var(--border-dim);
    }
    .image-attach-preview {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 8px;
    }
    .image-attach-preview img {
      width: 56px; height: 56px; object-fit: cover;
      border-radius: 7px; border: 1px solid var(--border);
    }
    .img-remove-btn {
      position: absolute; top: -4px; right: -4px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--danger); border: none; color: #fff;
      font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .thumb-wrap { position: relative; display: inline-block; }

    .input-box {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      transition: border-color .15s;
    }
    .input-box:focus-within { border-color: var(--accent); }
    .input-box textarea {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 13px;
      padding: 10px 12px;
      resize: none; min-height: 44px; max-height: 120px;
      font-family: inherit; line-height: 1.5;
    }
    .input-box textarea::placeholder { color: var(--text-muted); }
    .input-controls {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px;
      border-top: 1px solid var(--border-dim);
    }
    .attach-btn {
      background: transparent; border: none;
      color: var(--text-muted); cursor: pointer;
      padding: 5px; border-radius: 6px; font-size: 16px;
      transition: background .12s, color .12s;
    }
    .attach-btn:hover { background: var(--surface2); color: var(--text); }
    .mode-pill {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 12px; cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .mode-pill.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .spacer { flex: 1; }
    .model-select {
      background: transparent; border: 1px solid var(--border-dim);
      color: var(--text-dim); font-size: 11px;
      padding: 4px 8px; border-radius: 7px; cursor: pointer;
      outline: none;
    }
    .model-select option { background: var(--surface2); }
    .send-btn {
      width: 30px; height: 30px;
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; }
    .send-btn:hover:not(:disabled) { opacity: .88; }

    /* ── Viewer area ── */
    .viewer-area {
      flex: 1;
      position: relative;
      background: var(--viewer-bg);
      overflow: hidden;
    }
    #viewer { width: 100%; height: 100%; }
    .viewer-empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; color: var(--text-muted); font-size: 13px; pointer-events: none;
    }

    .viewer-bottom {
      position: absolute; bottom: 16px; left: 0; right: 0;
      display: flex; align-items: flex-end; padding: 0 16px;
      pointer-events: none;
    }
    .view-controls {
      display: flex; gap: 6px; align-items: center;
      pointer-events: all;
    }
    .view-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 11px;
      padding: 5px 10px; border-radius: 7px; cursor: pointer;
      transition: background .12s, color .12s;
    }
    .view-btn:hover, .view-btn.active { background: var(--surface2); color: var(--text); }

    .nav-cube {
      margin-left: auto; pointer-events: all;
      font-size: 9px; color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px;
      display: flex; gap: 8px; align-items: center;
    }
    .nav-face {
      cursor: pointer; padding: 2px 5px; border-radius: 3px;
      transition: background .12s, color .12s;
    }
    .nav-face:hover { background: var(--surface2); color: var(--text); }

    /* Renders strip */
    .renders-strip {
      position: absolute; top: 12px; right: 12px;
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: all;
    }
    .render-thumb {
      width: 64px;
      border-radius: 7px; overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color .12s;
      background: var(--surface);
    }
    .render-thumb:hover { border-color: var(--accent); }
    .render-thumb img { width: 100%; display: block; }
    .render-label { font-size: 9px; color: var(--text-muted); text-align: center; padding: 2px 0; display: block; }

    /* ── Parameters panel ── */
    .params-panel {
      width: var(--params-w);
      flex-shrink: 0;
      background: var(--panel-bg);
      border-left: 1px solid var(--border-dim);
      display: flex; flex-direction: column;
    }
    .params-header {
      height: 48px; flex-shrink: 0;
      display: flex; align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border-dim);
      gap: 8px;
    }
    .params-title { flex: 1; font-weight: 600; font-size: 14px; }
    .reset-btn {
      background: transparent; border: none;
      color: var(--text-muted); cursor: pointer; font-size: 16px;
      padding: 4px; border-radius: 5px;
      transition: color .12s, background .12s;
    }
    .reset-btn:hover { color: var(--text); background: var(--surface); }

    .params-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .params-list::-webkit-scrollbar { width: 4px; }
    .params-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .param-row {
      display: flex; align-items: center;
      padding: 8px 16px; gap: 8px;
      border-bottom: 1px solid var(--border-dim);
    }
    .param-label {
      width: 90px; flex-shrink: 0;
      font-size: 12px; color: var(--text-dim);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .param-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px; border-radius: 2px;
      background: var(--surface2);
      outline: none; cursor: pointer;
    }
    .param-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    .param-value {
      width: 38px; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 11px;
      padding: 3px 5px; border-radius: 5px;
      text-align: right; outline: none;
    }
    .param-value:focus { border-color: var(--accent); }
    .param-unit { font-size: 10px; color: var(--text-muted); width: 16px; flex-shrink: 0; }

    .params-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 160px; gap: 8px; color: var(--text-muted); font-size: 12px; text-align: center;
      padding: 0 20px;
    }

    .params-footer {
      flex-shrink: 0;
      padding: 12px 16px;
      border-top: 1px solid var(--border-dim);
      display: flex; gap: 8px;
    }
    .stl-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px;
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .stl-btn:hover { opacity: .88; }
    .stl-btn:disabled { opacity: .35; cursor: not-allowed; }
    .step-btn {
      padding: 9px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-dim); font-size: 13px; cursor: pointer;
      transition: background .12s, color .12s;
    }
    .step-btn:hover { background: var(--surface2); color: var(--text); }

    /* ── Code modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; width: 640px; max-width: 90vw; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; padding: 14px 16px;
      border-bottom: 1px solid var(--border-dim); gap: 8px;
    }
    .modal-title { flex: 1; font-weight: 600; font-size: 14px; }
    .modal-close {
      background: transparent; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 5px;
    }
    .modal-close:hover { background: var(--surface2); color: var(--text); }
    .code-body { flex: 1; overflow-y: auto; padding: 16px; }
    .code-body pre {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px; color: var(--text);
      white-space: pre-wrap; word-break: break-all;
    }
    .copy-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 12px; padding: 5px 11px; border-radius: 6px;
      cursor: pointer; transition: background .12s, color .12s;
    }
    .copy-btn:hover { background: var(--border); color: var(--text); }

    /* ── Settings modal ── */
    .settings-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
    .field-row { display: flex; flex-direction: column; gap: 5px; }
    .field-label { font-size: 12px; color: var(--text-dim); }
    .field-input {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-size: 13px;
      padding: 8px 10px; border-radius: 8px; outline: none;
      transition: border-color .15s;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-hint { font-size: 11px; color: var(--text-muted); }
    .settings-actions { display: flex; gap: 8px; padding-top: 4px; }
    .save-btn {
      flex: 1; padding: 9px; background: var(--accent); border: none;
      border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .save-btn:hover { opacity: .88; }
    .cancel-btn {
      padding: 9px 16px; background: transparent;
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-dim); font-size: 13px; cursor: pointer;
    }

    /* ── Build log inside chat ── */
    @keyframes spin { to { transform: rotate(360deg) } }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(4px) }
      to   { opacity: 1; transform: translateY(0) }
    }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

    .log-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; max-width: 90%;
    }
    .log-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; cursor: pointer;
      border-bottom: 1px solid var(--border-dim);
    }
    .log-card-title { font-size: 12px; font-weight: 500; color: var(--text-dim); }
    .log-chevron { font-size: 10px; color: var(--text-muted); transition: transform .2s; }
    .log-chevron.open { transform: rotate(180deg); }
    .log-body { display: none; max-height: 200px; overflow-y: auto; padding: 8px 12px; }
    .log-body.open { display: block; }
    .log-line {
      font-size: 11px; font-family: 'SF Mono', monospace;
      padding: 3px 0; color: var(--text-dim);
      display: flex; gap: 8px; align-items: baseline;
      animation: fadeSlideIn .2s ease both;
    }
    .log-line .ts { color: var(--text-muted); flex-shrink: 0; }
    .log-line.done .ltext { color: var(--success); }
    .log-line.err  .ltext { color: var(--danger); }
    .log-line.active .ltext { color: var(--text); }
    .log-spinner {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .7s linear infinite;
      margin-top: 1px;
    }
    .log-dot-ok  { width:7px; height:7px; border-radius:50%; background:var(--success); flex-shrink:0; margin-top:2px; }
    .log-dot-err { width:7px; height:7px; border-radius:50%; background:var(--danger);  flex-shrink:0; margin-top:2px; }
    .log-dot-dim { width:7px; height:7px; border-radius:50%; background:var(--border);  flex-shrink:0; margin-top:2px; }

    /* header spinner */
    .log-card-header.running .log-card-title { animation: pulse 1.5s ease infinite; }
    .log-card-header.running::before {
      content:'';
      display:inline-block; width:8px; height:8px; border-radius:50%;
      border:1.5px solid var(--border); border-top-color:var(--accent);
      animation: spin .7s linear infinite;
      flex-shrink:0;
    }

    /* ── Exec status badge in header ── */
    .exec-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-muted);
      padding: 3px 9px; border-radius: 12px;
      border: 1px solid var(--border-dim);
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
    .dot.ok  { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .dot.err { background: var(--danger); }
  </style>
</head>
<body>

<!-- ── Left Sidebar ── -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="logo">hard<span>w</span>are</div>
    <button class="new-btn" onclick="newSession()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      New Creation
    </button>
    <div class="section-label">Creations</div>
    <div class="sessions-list" id="sessions-list">
      <div style="font-size:11px;color:var(--text-muted);padding:8px 4px">Loading…</div>
    </div>
  </div>

<script type="module">
import * as THREE        from 'three'
import { STLLoader }     from 'three/addons/loaders/STLLoader.js'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

// ── State ──────────────────────────────────────────────────────────────────────
let sessionId     = localStorage.getItem('cad-session') || null
let mode          = 'new'
let busy          = false
let latestCode    = ''
let currentParams = {}
let paramDebounce = null
let scene, camera, renderer, controls, stlLoader
let currentMesh   = null

// ── Panel / mode helpers ───────────────────────────────────────────────────────
window.setMode = (m) => {
  mode = m
  document.getElementById('btn-new').classList.toggle('active', m === 'new')
  document.getElementById('btn-refine').classList.toggle('active', m === 'refine')
}
setMode('new')

// ── Three.js init (non-blocking) ───────────────────────────────────────────────
function resize() {
  if (!renderer) return
  const el = document.getElementById('viewer')
  const w = el.clientWidth, h = el.clientHeight
  if (!w || !h) return
  camera.aspect = w / h
  camera.updateProjectionMatrix()
  renderer.setSize(w, h)
}

function loadSTL(sid) {
  if (!stlLoader) return
  document.getElementById('viewer-empty').style.display = 'none'
  if (currentMesh) { scene.remove(currentMesh); currentMesh.geometry.dispose(); currentMesh = null }
  stlLoader.load(`/api/model/${sid}/stl`, geo => {
    geo.computeBoundingBox()
    const center = new THREE.Vector3()
    geo.boundingBox.getCenter(center)
    geo.translate(-center.x, -geo.boundingBox.min.y, -center.z)
    geo.computeBoundingBox()
    const size = new THREE.Vector3()
    geo.boundingBox.getSize(size)
    const maxDim = Math.max(size.x, size.y, size.z)
    const mat = new THREE.MeshPhongMaterial({ color: 0x0a84ff, specular: 0x112244, shininess: 50, side: THREE.DoubleSide })
    currentMesh = new THREE.Mesh(geo, mat)
    currentMesh.castShadow = true; currentMesh.receiveShadow = true
    scene.add(currentMesh)
    const dist = maxDim * 2.2
    camera.position.set(dist, dist * 0.8, dist)
    controls.target.set(0, size.y * 0.5, 0)
    controls.update()
  })
}

window.setViewMode = (m) => {
  document.querySelectorAll('[id^=vbtn-]').forEach(b => b.classList.remove('active'))
  document.getElementById('vbtn-' + m).classList.add('active')
  if (!currentMesh) return
  if (m === 'wireframe') {
    currentMesh.material.wireframe = true
  } else {
    currentMesh.material.wireframe = false
  }
}

window.setCamView = (v) => {
  if (!controls) return
  const d = camera.position.length()
  const p = { iso:[1,.8,1], front:[0,0,1], side:[1,0,0], top:[0,1,0] }[v] || [1,.8,1]
  camera.position.set(p[0]*d, p[1]*d, p[2]*d)
  controls.update()
}

// ── Three.js init ──────────────────────────────────────────────────────────────
try {
  const viewerEl = document.getElementById('viewer')
  scene = new THREE.Scene()
  scene.background = new THREE.Color(0x111113)
  camera = new THREE.PerspectiveCamera(45, 1, 0.01, 50000)
  camera.position.set(100, 80, 100)
  renderer = new THREE.WebGLRenderer({ antialias: true })
  renderer.setPixelRatio(window.devicePixelRatio)
  renderer.shadowMap.enabled = true
  renderer.shadowMap.type = THREE.PCFSoftShadowMap
  viewerEl.appendChild(renderer.domElement)

  scene.add(new THREE.AmbientLight(0xffffff, 0.4))
  const key = new THREE.DirectionalLight(0xffffff, 0.9)
  key.position.set(150, 200, 100); key.castShadow = true; scene.add(key)
  const fill = new THREE.DirectionalLight(0x8899cc, 0.2)
  fill.position.set(-100, 40, -100)
  scene.add(fill)
  scene.add(new THREE.GridHelper(400, 40, 0x1e1e28, 0x1e1e28))

  controls = new OrbitControls(camera, renderer.domElement)
  controls.enableDamping = true; controls.dampingFactor = 0.06
  stlLoader = new STLLoader()

  function resize() {
    const w = viewerEl.clientWidth, h = viewerEl.clientHeight
    if (!w || !h) return
    camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w, h)
  }
  new ResizeObserver(resize).observe(viewerEl)
  resize()
  ;(function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera) })()

  if (sessionId) setTimeout(() => loadSTL(sessionId), 200)
} catch(e) {
  console.error('Three.js init failed:', e)
  document.getElementById('viewer-empty').innerHTML = `<span style="color:var(--text-muted);font-size:12px">3D error: ${e.message}</span>`
}

// ── Image attachment ───────────────────────────────────────────────────────────
let attachedImage = null  // { base64, mimeType, dataUrl }

window.triggerImageUpload = () => document.getElementById('image-input').click()

window.handleImageFile = (file) => {
  if (!file) return
  const reader = new FileReader()
  reader.onload = (e) => {
    const dataUrl = e.target.result
    const mimeType = file.type || 'image/png'
    const base64 = dataUrl.split(',')[1]
    attachedImage = { base64, mimeType, dataUrl }
    renderAttachPreview()
  }
  reader.readAsDataURL(file)
}

function renderAttachPreview() {
  const el = document.getElementById('attach-preview')
  el.innerHTML = ''
  if (!attachedImage) return
  const wrap = document.createElement('div'); wrap.className = 'thumb-wrap'
  const img  = document.createElement('img')
  img.src = attachedImage.dataUrl
  const rm = document.createElement('button'); rm.className = 'img-remove-btn'
  rm.textContent = '✕'; rm.onclick = () => { attachedImage = null; renderAttachPreview() }
  wrap.append(img, rm); el.appendChild(wrap)
}

// paste image
document.addEventListener('paste', (e) => {
  const item = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'))
  if (item) window.handleImageFile(item.getAsFile())
})

// ── Chat helpers ───────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages')

function addMsg(type, content) {
  const wrap = document.createElement('div')
  wrap.className = `msg-wrap ${type}`
  const bubble = document.createElement('div')

  else bubble.appendChild(content)

  messagesEl.scrollTop = messagesEl.scrollHeight

function addUserMsg(text, imageDataUrl) {
  const wrap = document.createElement('div')

    const imgs = document.createElement('div'); imgs.className = 'msg-images'

    imgs.appendChild(img); wrap.appendChild(imgs)
  }
  const bubble = document.createElement('div'); bubble.className = 'msg-bubble'

  wrap.appendChild(bubble)
  messagesEl.appendChild(wrap)

}

// ── Build log (embedded in chat) ───────────────────────────────────────────────
let logCard = null, logBody = null

let lastLogLine = null

function startLog() {
  const wrap = document.createElement('div')
  wrap.className = 'msg-wrap assistant'
  const card = document.createElement('div'); card.className = 'log-card'
  const header = document.createElement('div'); header.className = 'log-card-header running'
  const title  = document.createElement('span'); title.className = 'log-card-title'; title.textContent = 'Building…'
  const chev   = document.createElement('span'); chev.className = 'log-chevron open'; chev.textContent = '▲'
  header.append(title, chev)
  header.onclick = () => {
    const isOpen = logBody.classList.toggle('open')
    chev.classList.toggle('open', isOpen)
  }
  logBody = document.createElement('div'); logBody.className = 'log-body open'
  card.append(header, logBody)
  wrap.appendChild(card)
  messagesEl.appendChild(wrap)
  messagesEl.scrollTop = messagesEl.scrollHeight
  logCard = { card, title, chev, header }
  lastLogLine = null
}

function appendLog(text, cls = '') {
  if (!logBody) return
  // Remove spinner from previous line
  if (lastLogLine) {
    const sp = lastLogLine.querySelector('.log-spinner')
    if (sp) {
      const dot = document.createElement('div')
      dot.className = lastLogLine.classList.contains('err') ? 'log-dot-err' : 'log-dot-ok'
      sp.replaceWith(dot)
    }
    lastLogLine.classList.remove('active')
  }
  const now = new Date()
  const ts  = `${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`
  const line = document.createElement('div')
  line.className = `log-line active ${cls}`
  const spinner = document.createElement('div'); spinner.className = 'log-spinner'
  const tsEl    = document.createElement('span'); tsEl.className = 'ts'; tsEl.textContent = ts
  const ltextEl = document.createElement('span'); ltextEl.className = 'ltext'
  ltextEl.textContent = text
  line.append(spinner, tsEl, ltextEl)
  logBody.appendChild(line)
  logBody.scrollTop = logBody.scrollHeight
  messagesEl.scrollTop = messagesEl.scrollHeight
  lastLogLine = line
}

function finishLog(title) {
  if (lastLogLine) {
    const sp = lastLogLine.querySelector('.log-spinner')
    if (sp) {
      const dot = document.createElement('div')
      const isErr = lastLogLine.classList.contains('err') || title === 'Failed'
      dot.className = isErr ? 'log-dot-err' : 'log-dot-ok'
      sp.replaceWith(dot)
    }
    lastLogLine.classList.remove('active')
  }
  if (logCard) {
    logCard.title.textContent = title
    logCard.header.classList.remove('running')
    logCard.chev.classList.remove('open')
  }
  if (logBody) logBody.classList.remove('open')
  lastLogLine = null
}

function addObjectCard(version, sessionId, code, metrics, printability, provider) {
  const wrap = document.createElement('div'); wrap.className = 'msg-wrap assistant'

  codeBtn.onclick = () => showCodeModal(code, `v${version} Code`)

// ── Parameters panel ───────────────────────────────────────────────────────────
function parseParams(code) {
  // Parse OpenSCAD parameters: name = number; // optional comment
  // Only from the top portion of the file (before first module/function)
  const topCode = code.split(/^(module |function )/m)[0]
  const params = {}
  const re = /^([a-zA-Z_$][a-zA-Z0-9_$]*)\s*=\s*(-?[\d.]+)\s*;[\t ]*(\/\/[^\n]*)?/gm
  let m
  while ((m = re.exec(topCode)) !== null) {
    const name = m[1]
    const value = parseFloat(m[2])
    if (isNaN(value)) continue
    // Humanize name: cup_height → Cup Height
    const displayName = name.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase())
    params[name] = { value, unit: 'mm', displayName }
  }
  return params
}

function renderParams(params, originalParams) {
  const list = document.getElementById('params-list')
  list.innerHTML = ''
  const keys = Object.keys(params)
  if (!keys.length) {
    list.innerHTML = '<div class="params-empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>No @param parameters found in generated code</div>'
    return
  }
  for (const name of keys) {
    const { value, unit } = params[name]
    const min = Math.max(0.1, value * 0.1)
    const max = value * 4
    const row = document.createElement('div'); row.className = 'param-row'
    const label = document.createElement('div'); label.className = 'param-label'
    label.title = name
    label.textContent = params[name].displayName || name

    const slider = document.createElement('input'); slider.type = 'range'; slider.className = 'param-slider'
    slider.min = min; slider.max = max; slider.step = 0.5; slider.value = value

    const valInput = document.createElement('input'); valInput.type = 'number'; valInput.className = 'param-value'
    valInput.value = value; valInput.step = 0.5; valInput.min = min; valInput.max = max

    const unitEl = document.createElement('div'); unitEl.className = 'param-unit'; unitEl.textContent = unit

    slider.oninput = () => { valInput.value = slider.value; scheduleParamUpdate(name, parseFloat(slider.value)) }
    valInput.onchange = () => { slider.value = valInput.value; scheduleParamUpdate(name, parseFloat(valInput.value)) }

    row.append(label, slider, valInput, unitEl)
    list.appendChild(row)
  }
}

function scheduleParamUpdate(name, value) {
  currentParams[name].value = value
  clearTimeout(paramDebounce)
  paramDebounce = setTimeout(() => applyParams(), 600)
}

async function applyParams() {
  if (!sessionId) return
  const patchValues = {}
  for (const [k, v] of Object.entries(currentParams)) patchValues[k] = v.value

  startLog()
  appendLog('Updating parameters and re-executing…')
  try {
    const res = await fetch(`/api/model/${sessionId}/exec-params`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ params: patchValues }),
    })
    const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = ''
    while (true) {
      const { done, value } = await reader.read(); if (done) break
      buf += dec.decode(value, { stream: true })
      const lines = buf.split('\n'); buf = lines.pop()
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        const evt = JSON.parse(line.slice(6))
        if (evt.type === 'log')   appendLog(evt.text)
        if (evt.type === 'error') { appendLog(`Error: ${evt.text}`, 'err'); finishLog('Failed'); return }
        if (evt.type === 'done') {
          finishLog('Updated')
          loadSTL(sessionId + '?t=' + Date.now())
          // force reload by clearing and reloading
          setTimeout(() => loadSTL(sessionId), 100)
          showRenders(sessionId, evt.renderViews || [])
        }
      }
    }
  } catch(e) { appendLog(`Error: ${e.message}`, 'err'); finishLog('Failed') }
}

window.resetParams = () => {
  if (!currentParams) return
  for (const [k, v] of Object.entries(currentParams)) v.value = v.original
  renderParams(currentParams, currentParams)
  applyParams()
}

// ── Renders ────────────────────────────────────────────────────────────────────
function showRenders(sid, views) {
  const strip = document.getElementById('renders-strip')
  strip.innerHTML = ''
  for (const view of views) {
    const wrap = document.createElement('div'); wrap.className = 'render-thumb'
    const img  = document.createElement('img'); img.src = `/api/model/${sid}/render/${view}?t=${Date.now()}`; img.alt = view
    const lbl  = document.createElement('span'); lbl.className = 'render-label'; lbl.textContent = view
    wrap.append(img, lbl); strip.appendChild(wrap)
  }
}

// ── STL / STEP download ────────────────────────────────────────────────────────
window.downloadSTL = () => {
  if (!sessionId) return
  const a = document.createElement('a')
  a.href = `/api/model/${sessionId}/stl`; a.download = 'model.stl'; a.click()
}
window.downloadSTEP = () => {
  if (!sessionId) return
  const a = document.createElement('a')
  a.href = `/api/model/${sessionId}/step`; a.download = 'model.step'; a.click()
}

// ── Code modal ─────────────────────────────────────────────────────────────────
let latestCodeForModal = ''
window.showCodeModal = (code, title) => {
  latestCodeForModal = code
  document.getElementById('code-pre').textContent = code
  if (title) document.getElementById('code-modal-title').textContent = title
  document.getElementById('code-modal').classList.add('open')
}
window.closeCode  = () => document.getElementById('code-modal').classList.remove('open')
window.copyCode   = () => navigator.clipboard.writeText(latestCodeForModal).catch(() => {})

// ── Generate (SSE) ─────────────────────────────────────────────────────────────
let versionCounter = 0

window.send = async function() {
  if (busy) return
  const input = document.getElementById('prompt-input')
  const desc  = input.value.trim()
  if (!desc) return

  busy = true
  document.getElementById('send-btn').disabled = true
  const imgSnapshot = attachedImage ? { ...attachedImage } : null
  input.value = ''
  attachedImage = null; renderAttachPreview()

  addUserMsg(desc, imgSnapshot?.dataUrl)
  startLog()
  appendLog('Connecting…')

  try {
    const body = {
      description: desc,
      sessionId,
      mode: (mode === 'refine' && sessionId) ? 'refine' : 'new',
      ...(imgSnapshot ? { imageBase64: imgSnapshot.base64, imageMimeType: imgSnapshot.mimeType } : {}),
    }
    const res    = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
    const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = ''

    while (true) {
      const { done, value } = await reader.read(); if (done) break
      buf += dec.decode(value, { stream: true })
      const lines = buf.split('\n'); buf = lines.pop()
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        const evt = JSON.parse(line.slice(6))
        if (evt.type === 'log') {
          appendLog(evt.text)
        } else if (evt.type === 'code') {
          latestCode = evt.code
          appendLog('Code ready')
        } else if (evt.type === 'done') {
          sessionId = evt.sessionId
          localStorage.setItem('cad-session', sessionId)
          versionCounter++
          finishLog(`Done — ${evt.rounds} round${evt.rounds>1?'s':''}`)
          const cfg = await fetch('/api/ai-config').then(r=>r.json()).catch(()=>({}))
          addObjectCard(versionCounter, sessionId, latestCode, evt.metrics, evt.printability, cfg.provider || 'claude-cli')
          loadSTL(sessionId)
          showRenders(sessionId, evt.renderViews || [])
          setMode('refine')
          document.getElementById('chat-title').textContent = desc.slice(0, 40)
          document.getElementById('stl-btn').disabled = false
          // Parse and show parameters
          const params = parseParams(latestCode)
          for (const [k, v] of Object.entries(params)) currentParams[k] = { ...v, original: v.value }
          renderParams(currentParams)
          // Refresh sidebar
          loadSessions()
        } else if (evt.type === 'error') {
          appendLog(`Error: ${evt.text}`, 'err')
          finishLog('Failed')
          addMsg('error', evt.text)
        }
      }
    }
  } catch(e) {
    appendLog(`Request failed: ${e.message}`, 'err')
    finishLog('Failed')
  }
  busy = false
  document.getElementById('send-btn').disabled = false
}

document.getElementById('prompt-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
})

// ── Status check ───────────────────────────────────────────────────────────────
async function checkExec() {
  try {
    const { executor, aiProvider } = await fetch('/api/status').then(r => r.json())
    document.getElementById('exec-dot').className = `dot ${executor ? 'ok' : 'err'}`
    document.getElementById('exec-label').textContent = executor ? aiProvider ?? 'ready' : 'offline'
  } catch {
    document.getElementById('exec-dot').className = 'dot err'
    document.getElementById('exec-label').textContent = 'error'
  }
}
checkExec(); setInterval(checkExec, 10_000)

// ── Sessions sidebar ───────────────────────────────────────────────────────────
async function loadSessions() {
  const list = document.getElementById('sessions-list')
  try {
    const assets = await fetch('/api/assets').then(r => r.json())
    list.innerHTML = ''
    if (!assets.length) {
      list.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding:8px 4px">No creations yet</div>'
      return
    }
    for (const a of assets) {
      const item = document.createElement('div')
      item.className = 'session-item' + (a.id === sessionId ? ' active' : '')
      item.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span class="session-name">${a.description.slice(0, 32)}</span>`
      item.onclick = () => loadSession(a)
      list.appendChild(item)
    }
  } catch(e) {
    list.innerHTML = `<div style="font-size:11px;color:var(--danger);padding:8px 4px">Error loading sessions</div>`
  }
}

async function loadSession(asset) {
  sessionId = asset.id
  localStorage.setItem('cad-session', sessionId)
  document.getElementById('chat-title').textContent = asset.description.slice(0, 40)
  document.getElementById('stl-btn').disabled = false
  setMode('refine')
  loadSTL(sessionId)
  showRenders(sessionId, asset.renders || [])
  // Load code and params
  try {
    const meta = await fetch(`/api/model/${sessionId}/meta`).then(r => r.json())
    if (meta.code) {
      latestCode = meta.code
      const params = parseParams(meta.code)
      for (const [k, v] of Object.entries(params)) currentParams[k] = { ...v, original: v.value }
      renderParams(currentParams)
    }
  } catch {}
  // Update sidebar highlight
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'))
  event.currentTarget.classList.add('active')
}

window.newSession = () => {
  sessionId = null
  localStorage.removeItem('cad-session')
  setMode('new')
  document.getElementById('chat-title').textContent = 'New Creation'
  document.getElementById('messages').innerHTML = '<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:20px 0">Describe the part you want to design.<br>Optionally attach a reference image.</div>'
  document.getElementById('params-list').innerHTML = '<div class="params-empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Generate a model to see its parameters here</div>'
  document.getElementById('renders-strip').innerHTML = ''
  document.getElementById('stl-btn').disabled = true
  if (currentMesh && scene) { scene.remove(currentMesh); currentMesh.geometry.dispose(); currentMesh = null }
  document.getElementById('viewer-empty').style.display = ''
  currentParams = {}; versionCounter = 0
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'))
}

loadSessions()

// ── Provider select (inline in input bar) ─────────────────────────────────────
window.onProviderSelectChange = async function() {
  const p = document.getElementById('provider-select').value
  const current = await fetch('/api/ai-config').then(r=>r.json()).catch(()=>({}))
  await fetch('/api/ai-config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ ...current, provider: p }) })
  checkExec()
}

// Sync inline selector with saved config on load
fetch('/api/ai-config').then(r=>r.json()).then(cfg => {
  const sel = document.getElementById('provider-select')
  if (sel) sel.value = cfg.provider || 'claude-cli'
}).catch(()=>{})

// ── Settings modal ─────────────────────────────────────────────────────────────
window.openSettings = async function() {
  try {
    const cfg = await fetch('/api/ai-config').then(r => r.json())
    document.getElementById('cfg-provider').value   = cfg.provider || 'claude-cli'
    document.getElementById('cfg-model').value      = cfg.model    || ''
    document.getElementById('cfg-apikey').value     = cfg.apiKey   || ''
    document.getElementById('cfg-baseurl').value    = cfg.baseUrl  || ''
    document.getElementById('cfg-status').textContent = ''
    onSettingsProviderChange()
  } catch {}
  document.getElementById('settings-modal').classList.add('open')
}
window.closeSettings = () => document.getElementById('settings-modal').classList.remove('open')

window.onSettingsProviderChange = function() {
  const p = document.getElementById('cfg-provider').value
  document.getElementById('cfg-key-row').style.display = p === 'claude-cli' ? 'none' : 'flex'
  document.getElementById('cfg-url-row').style.display = p === 'openai' ? 'flex' : 'none'
  const hints = {
    'claude-cli': 'Uses your local Claude Code CLI — no API key needed.',
    'anthropic':  'Direct Anthropic API. Supports vision with image attachments.',
    'gemini':     'Google Gemini API. Supports vision with image attachments.',
    'openai':     'Any OpenAI-compatible server: Ollama, LM Studio, OpenRouter, etc.',
  }
  document.getElementById('cfg-hint').textContent = hints[p] ?? ''
  document.getElementById('cfg-key-row').style.display = (p === 'claude-cli' || p === 'openai') ? 'none' : 'flex'
}

window.saveSettings = async function() {
  const st = document.getElementById('cfg-status')
  st.textContent = 'Saving…'; st.style.color = 'var(--text-muted)'
  try {
    const body = {
      provider: document.getElementById('cfg-provider').value,
      model:    document.getElementById('cfg-model').value.trim(),
      apiKey:   document.getElementById('cfg-apikey').value.trim(),
      baseUrl:  document.getElementById('cfg-baseurl').value.trim(),
    }
    await fetch('/api/ai-config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
    st.textContent = '✓ Saved'; st.style.color = 'var(--success)'
    document.getElementById('provider-select').value = body.provider
    checkExec()
    setTimeout(closeSettings, 600)
  } catch(e) { st.textContent = `Error: ${e.message}`; st.style.color = 'var(--danger)' }
}

</script>
