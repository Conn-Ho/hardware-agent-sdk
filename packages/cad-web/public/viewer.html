<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assembly Viewer — Hardware Agent SDK</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

  #canvas-wrap { width: 100vw; height: 100vh; }
  canvas { display: block; }

  /* Top toolbar */
  #toolbar {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(20,22,30,0.92); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 8px 16px; display: flex; gap: 10px; align-items: center;
    backdrop-filter: blur(8px); z-index: 10; font-size: 13px;
  }
  #toolbar .title { font-weight: 600; opacity: 0.85; max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #toolbar button {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: #ddd; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px;
    transition: background 0.15s;
  }
  #toolbar button:hover { background: rgba(255,255,255,0.16); }
  .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }

  /* Bottom stats */
  #stats {
    position: fixed; bottom: 14px; left: 14px;
    background: rgba(20,22,30,0.88); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 8px 12px; font-size: 12px; line-height: 1.7;
    backdrop-filter: blur(6px); z-index: 10; opacity: 0;
    transition: opacity 0.3s;
  }
  #stats.visible { opacity: 1; }
  #stats .label { color: rgba(255,255,255,0.4); margin-right: 6px; }
  #stats .val   { color: #7eb8f7; font-variant-numeric: tabular-nums; }

  /* Loading overlay */
  #loading {
    position: fixed; inset: 0; background: #0f1117;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 100; transition: opacity 0.4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #5b8fff; border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .hint { opacity: 0.45; font-size: 13px; }

  /* Controls hint */
  #hint {
    position: fixed; bottom: 14px; right: 14px;
    background: rgba(20,22,30,0.7); border-radius: 8px; padding: 8px 12px;
    font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.8; z-index: 10;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">正在加载 Three.js…</div>
  <div class="hint">Hardware Agent SDK — Assembly Viewer</div>
</div>

<div id="canvas-wrap"></div>

<div id="toolbar">
  <span class="title" id="model-title">—</span>
  <div class="sep"></div>
  <button id="btn-reset">复位视角</button>
  <button id="btn-wireframe">线框</button>
  <button id="btn-download">下载 STL</button>
</div>

<div id="stats">
  <div><span class="label">尺寸</span><span class="val" id="s-dims">—</span></div>
  <div><span class="label">体积</span><span class="val" id="s-vol">—</span></div>
  <div><span class="label">面数</span><span class="val" id="s-tri">—</span></div>
</div>

<div id="hint">
  🖱 左键旋转 &nbsp;·&nbsp; 右键平移 &nbsp;·&nbsp; 滚轮缩放
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import { STLLoader }     from 'three/addons/loaders/STLLoader.js'

// ── Parse params ─────────────────────────────────────────────────────────────
const params    = new URLSearchParams(location.search)
const sessionId = params.get('id')
const stlUrl    = sessionId
  ? `/api/model/${encodeURIComponent(sessionId)}/stl`
  : params.get('url') || null

setLoadingText(stlUrl ? '正在加载模型…' : '未指定模型 ID')
setTitle(sessionId ? `模型 ${sessionId.slice(0, 8)}…` : '无模型')

// ── Scene setup ───────────────────────────────────────────────────────────────
const wrap     = document.getElementById('canvas-wrap')
const renderer = new THREE.WebGLRenderer({ antialias: true })
renderer.setPixelRatio(window.devicePixelRatio)
renderer.setSize(wrap.clientWidth, wrap.clientHeight)
renderer.shadowMap.enabled = true
renderer.shadowMap.type    = THREE.PCFSoftShadowMap
renderer.toneMapping       = THREE.ACESFilmicToneMapping
wrap.appendChild(renderer.domElement)

const scene  = new THREE.Scene()
scene.background = new THREE.Color(0x0f1117)

const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.01, 5000)
camera.position.set(80, 60, 120)

const controls = new OrbitControls(camera, renderer.domElement)
controls.enableDamping = true
controls.dampingFactor = 0.07

// ── Lights ───────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.45)
scene.add(ambient)

const key = new THREE.DirectionalLight(0xffffff, 1.2)
key.position.set(100, 160, 80)
key.castShadow = true
scene.add(key)

const fill = new THREE.DirectionalLight(0x8cb4ff, 0.5)
fill.position.set(-80, 40, -60)
scene.add(fill)

const rim = new THREE.DirectionalLight(0xffeedd, 0.35)
rim.position.set(0, -80, 100)
scene.add(rim)

// ── Grid ─────────────────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(300, 30, 0x2a2d3a, 0x1e2030)
grid.position.y = 0
scene.add(grid)

// ── Material ──────────────────────────────────────────────────────────────────
const solidMat = new THREE.MeshPhysicalMaterial({
  color: 0x5b8fff,
  metalness: 0.05,
  roughness: 0.55,
  clearcoat: 0.15,
  clearcoatRoughness: 0.3,
})
const wireMat = new THREE.MeshBasicMaterial({ color: 0x8ab4ff, wireframe: true })

let mesh = null
let isWireframe = false

// ── Load STL ─────────────────────────────────────────────────────────────────
if (stlUrl) {
  const loader = new STLLoader()
  loader.load(
    stlUrl,
    (geometry) => {
      geometry.computeVertexNormals()
      geometry.center()

      mesh = new THREE.Mesh(geometry, solidMat)
      mesh.castShadow    = true
      mesh.receiveShadow = true

      // Position on grid
      const box = new THREE.Box3().setFromObject(mesh)
      const size = box.getSize(new THREE.Vector3())
      mesh.position.y = size.y / 2

      scene.add(mesh)

      // Fit camera
      const maxDim = Math.max(size.x, size.y, size.z)
      const fov    = camera.fov * (Math.PI / 180)
      const dist   = Math.abs(maxDim / Math.sin(fov / 2)) * 0.75
      camera.position.set(dist * 0.6, dist * 0.45, dist * 0.8)
      controls.target.set(0, size.y / 2, 0)
      camera.near = dist * 0.001
      camera.far  = dist * 10
      camera.updateProjectionMatrix()

      // Update stats
      const triangles = geometry.index
        ? geometry.index.count / 3
        : geometry.attributes.position.count / 3

      document.getElementById('s-dims').textContent =
        `${size.x.toFixed(1)} × ${size.y.toFixed(1)} × ${size.z.toFixed(1)} mm`
      document.getElementById('s-vol').textContent =
        `${(size.x * size.y * size.z / 1000).toFixed(1)} cm³ (bbox)`
      document.getElementById('s-tri').textContent =
        `${Math.round(triangles).toLocaleString()} 面`
      document.getElementById('stats').classList.add('visible')

      hideLoading()
    },
    (xhr) => {
      if (xhr.total) {
        const pct = Math.round(xhr.loaded / xhr.total * 100)
        setLoadingText(`加载中 ${pct}%…`)
      }
    },
    (err) => {
      setLoadingText(`加载失败: ${err.message || err}`)
    }
  )
} else {
  setLoadingText('请在 URL 中指定 ?id=<sessionId>')
}

// ── Toolbar buttons ───────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  if (!mesh) return
  const box  = new THREE.Box3().setFromObject(mesh)
  const size = box.getSize(new THREE.Vector3())
  const maxDim = Math.max(size.x, size.y, size.z)
  const fov    = camera.fov * (Math.PI / 180)
  const dist   = Math.abs(maxDim / Math.sin(fov / 2)) * 0.75
  camera.position.set(dist * 0.6, dist * 0.45, dist * 0.8)
  controls.target.set(0, size.y / 2, 0)
  controls.update()
})

document.getElementById('btn-wireframe').addEventListener('click', () => {
  if (!mesh) return
  isWireframe = !isWireframe
  mesh.material = isWireframe ? wireMat : solidMat
  document.getElementById('btn-wireframe').textContent = isWireframe ? '实体' : '线框'
})

document.getElementById('btn-download').addEventListener('click', () => {
  if (!stlUrl) return
  const a = document.createElement('a')
  a.href = stlUrl
  a.download = `model_${sessionId || 'export'}.stl`
  a.click()
})

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = wrap.clientWidth, h = wrap.clientHeight
  camera.aspect = w / h
  camera.updateProjectionMatrix()
  renderer.setSize(w, h)
})

// ── Render loop ───────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate)
  controls.update()
  renderer.render(scene, camera)
}
animate()

// ── Helpers ───────────────────────────────────────────────────────────────────
function setLoadingText(t) { document.getElementById('loading-text').textContent = t }
function setTitle(t)       { document.getElementById('model-title').textContent = t }
function hideLoading()     { document.getElementById('loading').classList.add('hidden') }
</script>
</body>
</html>
